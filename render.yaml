services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: volunteer-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: volunteer-db
          property: connectionString
      - key: AI_SERVICE_URL
        sync: false   # fill in after AI service is deployed
      - key: JWT_SECRET
        generateValue: true

  # ── AI Microservice ───────────────────────────────────────────────────────────
  - type: web
    name: volunteer-ai-service
    runtime: python
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: volunteer-db
          property: connectionString

databases:
  - name: volunteer-db
    databaseName: volunteer_coordination
    user: volunteer_user
    plan: free
